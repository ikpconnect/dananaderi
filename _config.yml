repository: https://github.com/ikpconnect/dananaderi
# favicon: Directory of your favicon (eg. images/favicon.ico)(optional)

# Personal info
name: Dana Naderi
title: PhD Student in Statistics · CEREMADE, Université Paris Dauphine — PSL
email: naderi@ceremade.dauphine.fr
#phone: Your phone number (optional)
