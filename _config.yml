# Site
# Site URL configuration:
#  - For a USER site (repo named `<user>.github.io`):
#       url:     "https://<user>.github.io"
#       baseurl: ""
#  - For a PROJECT site (any other repo name):
#       url:     "https://<user>.github.io"
#       baseurl: "/<repo-name>"      <-- the leading slash matters
#  - For local development with `jekyll serve`, the safest setting is:
#       url:     ""
#       baseurl: ""
#
# Currently configured for the project site at ikpconnect/dananaderi:
url: "https://ikpconnect.github.io"
baseurl: "/dananaderi"
description: "Personal website of Dana Naderi, PhD student in Statistics at CEREMADE, Université Paris Dauphine — PSL."
image: images/profile.jpg
logo: 'images/profile.jpg'
favicon: 'images/profile.jpg'
# google_analytics: 'UA-XXXXXXXX-X'
#disqus: 'your-disqus-shortname'
#mailchimp-list: 'https://example.us11.list-manage.com/subscribe/post?u=XXXXXXXX&amp;id=XXXXXXXX'
include:
  - _pages
  - _static
#permalink: /:title/




