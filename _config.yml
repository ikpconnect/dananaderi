# Projects Section
# projects_title: Projects #(Use this to override about projects section title)

# Experience Section
# experience_title: Experience #(Use this to override about experience section title)

# Education Section
education_title: Education #(Use this to override about education section title)
publication_title: Publications
skills_title: Skills
# More Section
# more_title: A Little More About Me #(Use this to override about more section title)


# more content
more_content: | # this will include new lines to allow paragraphs


# Footer
footer_show_references: true

# Build settings
#theme: modern-resume-theme (Use this is you are hosting your resume yourself)
# remote_theme: sproogen/modern-resume-theme (Use this if you are hosting your resume on GitHub)
#theme: jekyll-theme-hacker

# Markdown processor settings
markdown: kramdown
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# =============================================================================
# CITATION STYLE CONFIGURATION
# =============================================================================
# Academic citation/reference style for blog posts.
# Supported styles:
#   - "apa"       : APA 7th Edition (Author, Year. Title. URL)
#   - "ieee"      : IEEE (Author, "Title," Year. [Online]. Available: URL)
#   - "chicago"   : Chicago Author-Date (Author. Year. "Title." URL)
#   - "vancouver" : Vancouver/Numeric (Author. Title. Year. URL) [default]
# =============================================================================
citation_style: "apa"

# Collections for internal blog posts (separate from project posts in _posts/)
collections:
  blog_posts:
    output: true
    permalink: /blog/:title/

defaults:
  - scope:
      path: ""
    values:
      image: images/profile.jpg
  - scope:
      path: _posts
    values:
      layout: post
      permalink: /projects/:title/
  - scope:
      path: _pages
    values:
      layout: page
  - scope:
      path: ""
      type: blog_posts
    values:
      layout: post
sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

exclude: [
  "Gemfile",
  "Gemfile.lock",
  "node_modules",
  "vendor/bundle/",
  "vendor/cache/",
  "vendor/gems/",
  "vendor/ruby/",
  "lib/",
  "scripts/",
  "docker-compose.yml",
]
