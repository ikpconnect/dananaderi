  details: |
    **Abstract:** Efficient Bayesian model selection relies on the model evidence
    or marginal likelihood, whose computation often requires evaluating an
    intractable integral. We propose the Elliptical Covering Marginal Likelihood
    Estimator (ECMLE), based on covering the highest posterior density region with
    non-overlapping ellipsoids. ECMLE eliminates the infinite-variance issue of
    the original harmonic mean estimator, allows exact volume computation, and
    works in multimodal settings.

    **Software:** R package [`ECMLE`](https://cran.r-project.org/web/packages/ECMLE/index.html) on CRAN.
